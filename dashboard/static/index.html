<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenClaw Resilience Guard</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">RG</span>
        <div>
          <strong>Resilience Guard</strong>
          <span data-i18n="brandSub">OpenClaw 看门狗</span>
        </div>
      </div>
      <nav class="nav">
        <a href="#overview" data-i18n="navOverview">总览</a>
        <a href="#events" data-i18n="navEvents">趋势</a>
        <a href="#strategy" data-i18n="navStrategy">策略</a>
        <a href="#logs" data-i18n="navLogs">日志</a>
      </nav>
      <div class="side-note">
        <span data-i18n="sideNote">独立运行在 localhost，Gateway 挂了也能打开。</span>
      </div>
    </aside>

    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">OpenClaw Watchdog</p>
          <h1 data-i18n="pageTitle">恢复控制台</h1>
        </div>
        <div class="top-actions">
          <select id="langSelect" title="Language">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
          <select id="themeSelect" title="Theme">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
            <option value="ocean">Ocean</option>
            <option value="forest">Forest</option>
          </select>
          <button id="refreshBtn" class="icon-btn" title="刷新">↻</button>
          <button id="exportBtn" class="primary" data-i18n="export">导出诊断</button>
        </div>
      </header>

    <section id="overview" class="hero">
      <div class="status-pane">
        <div id="mainStatus" class="status-dot unknown"></div>
        <div>
          <p class="muted" data-i18n="currentDecision">当前判断</p>
          <h2 id="statusText">读取中</h2>
          <p id="statusReason" class="muted">正在汇总 watchdog 状态。</p>
        </div>
      </div>
      <div class="metric-strip">
        <div><strong id="restartCount">0</strong><span data-i18n="recentRestarts">近期重启</span></div>
        <div><strong id="categoryCount">0</strong><span data-i18n="signalTypes">异常类别</span></div>
        <div><strong id="modelOk">0</strong><span data-i18n="modelOk">模型成功</span></div>
        <div><strong id="modelFail">0</strong><span data-i18n="modelFail">模型失败</span></div>
      </div>
    </section>

    <section class="grid main-grid">
      <article class="panel">
        <div class="panel-head">
          <h3 data-i18n="layers">链路分层</h3>
          <span id="updatedAt" class="muted"></span>
        </div>
        <div id="layers" class="layers"></div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <h3 data-i18n="signalCategories">异常分类</h3>
          <span class="muted">OpenClaw logs</span>
        </div>
        <canvas id="categoryChart" class="chart chart-bars"></canvas>
      </article>
    </section>

    <section id="events" class="grid">
      <article class="panel wide">
        <div class="panel-head">
          <h3 data-i18n="eventTrend">事件趋势</h3>
          <span class="muted" data-i18n="eventTrendHint">诊断与模型探针</span>
        </div>
        <canvas id="timelineChart" class="chart chart-timeline"></canvas>
      </article>

      <article id="strategy" class="panel">
        <div class="panel-head">
          <h3 data-i18n="quickStrategy">快速策略</h3>
          <span id="actionState" class="pill">只读</span>
        </div>
        <button id="unlockBtn" class="wide-btn" data-i18n="unlock">解锁操作</button>
        <div class="preset-grid">
          <button data-preset="observe" data-tip-key="tipObserve" data-i18n="presetObserve">观察模式</button>
          <button data-preset="overnight" data-tip-key="tipOvernight" data-i18n="presetOvernight">夜间诊断</button>
          <button data-preset="channel-recovery" data-tip-key="tipChannel" data-i18n="presetChannel">通道恢复</button>
          <button data-preset="conservative" data-tip-key="tipConservative" data-i18n="presetConservative">保守熔断</button>
        </div>
        <p id="strategyTip" class="hint" data-i18n="strategyTip">悬停策略按钮查看说明。</p>
        <div class="danger-row">
          <button id="diagBtn" data-i18n="runDiag">立即诊断</button>
          <button id="restartBtn" class="danger" data-i18n="restartGateway">重启 Gateway</button>
        </div>
      </article>
    </section>

    <section class="grid">
      <article class="panel">
        <div class="panel-head">
          <h3 data-i18n="configSummary">配置摘要</h3>
          <span class="muted" data-i18n="sensitiveMasked">敏感项已遮盖</span>
        </div>
        <dl id="configList" class="config-list"></dl>
      </article>

      <article class="panel">
        <div class="panel-head">
          <h3 data-i18n="stateFiles">状态文件</h3>
          <span class="muted">mtime</span>
        </div>
        <div id="fileList" class="file-list"></div>
      </article>
    </section>

    <section id="logs" class="panel">
      <div class="panel-head">
        <h3 data-i18n="recentLogs">最近日志</h3>
        <label class="toggle"><input id="followLog" type="checkbox" checked><span data-i18n="followLatest">保持最新</span></label>
      </div>
      <pre id="logTail" class="log"></pre>
    </section>
  </main>
  </div>

  <div id="toast" class="toast" hidden></div>
  <script src="/app.js"></script>
</body>
</html>
